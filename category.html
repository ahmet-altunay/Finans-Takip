<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategori Yönetimi</title>
  <link rel="stylesheet" href="style.css">
  <style>
    ul { list-style: none; padding: 0; max-width: 600px; margin: 20px auto; }
    li { background: white; padding: 15px; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .gelir { border-left: 6px solid #28a745; }
    .gider { border-left: 6px solid #dc3545; }
    .transfer { border-left: 6px solid #17a2b8; }
    .sil-btn { background: #dc3545; color: white; border: none; padding: 8px 14px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>📂 Kategori Yönetimi</h1>

  <form id="kategoriForm" style="max-width:500px; margin:20px auto; background:white; padding:25px; border-radius:10px;">
    <h2>Yeni Kategori Ekle</h2>
    <input type="text" id="kategoriAdi" placeholder="Kategori adı" required style="width:100%; padding:12px; margin:10px 0;">
    <select id="kategoriTipi" required style="width:100%; padding:12px; margin:10px 0;">
      <option value="">Tip seçin</option>
      <option value="gelir">Gelir (+)</option>
      <option value="gider">Gider (-)</option>
      <option value="transfer">Transfer (↔)</option>
    </select>
    <button type="submit" style="width:100%; padding:12px;">Kategori Oluştur</button>
  </form>

  <h2 style="text-align:center;">Mevcut Kategoriler</h2>
  <ul id="kategoriListesi"></ul>

  <nav class="menu" style="max-width:500px; margin:30px auto;">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Kayıt Ekle</a>
  </nav>

  <script src="app.js"></script>
  <script>
    function listCategories() {
      const liste = document.getElementById('kategoriListesi');
      liste.innerHTML = '';
      const cats = JSON.parse(localStorage.getItem('kategoriler')) || [];

      cats.forEach((kat, index) => {
        const li = document.createElement('li');
        li.className = kat.tip;
        li.innerHTML = `
          <span><strong>${kat.ad}</strong> — ${kat.tip.toUpperCase()}</span>
          <button class="sil-btn" onclick="deleteCategory(${index})">Sil</button>
        `;
        liste.appendChild(li);
      });
    }

    document.getElementById('kategoriForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const ad = document.getElementById('kategoriAdi').value.trim();
      const tip = document.getElementById('kategoriTipi').value;
      if (!ad || !tip) return alert('Ad ve tip zorunlu!');

      let cats = JSON.parse(localStorage.getItem('kategoriler')) || [];
      if (cats.some(k => k.ad === ad)) return alert('Bu kategori zaten var!');

      cats.push({ad, tip});
      localStorage.setItem('kategoriler', JSON.stringify(cats));
      document.getElementById('kategoriAdi').value = '';
      listCategories();
      alert('✅ Kategori eklendi!');
    });

    window.deleteCategory = function(index) {
      if (confirm('Silmek istediğinize emin misiniz?')) {
        let cats = JSON.parse(localStorage.getItem('kategoriler')) || [];
        cats.splice(index, 1);
        localStorage.setItem('kategoriler', JSON.stringify(cats));
        listCategories();
      }
    };

    listCategories();
  </script>
</body>
</html>

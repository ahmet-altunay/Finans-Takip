<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tüm Kayıtlar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .actions button {
      margin: 2px;
      padding: 6px 12px;
      font-size: 13px;
    }
    .edit-btn {
      background: #ffc107;
      color: black;
    }
    .edit-btn:hover {
      background: #e0a800;
    }
  </style>
</head>
<body>
  <h1>📋 Tüm Kayıtlar</h1>

  <table id="recordsTable">
    <thead>
      <tr>
        <th>Tarih</th>
        <th>Tür</th>
        <th>Kategori</th>
        <th>Açıklama</th>
        <th>Tutar</th>
        <th>Hesap/Kart</th>
        <th>İşlemler</th>
      </tr>
    </thead>
    <tbody id="recordsList"></tbody>
  </table>

  <div id="emptyMessage" style="text-align:center; font-size:18px; color:#666; margin-top:30px; display:none;">
    Henüz hiç kayıt yok.
  </div>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Yeni Kayıt Ekle</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>
  <script>
    let currentEditIndex = -1;   // Düzenleme için index tutuyoruz

    function loadRecords() {
      let records = JSON.parse(localStorage.getItem("transactions")) || [];
      
      // Tarihe göre yeniden eskiye sırala (en yeni üstte)
      records.sort((a, b) => new Date(b.date) - new Date(a.date));

      const tbody = document.getElementById("recordsList");
      const emptyMsg = document.getElementById("emptyMessage");
      const table = document.getElementById("recordsTable");

      tbody.innerHTML = "";

      if (records.length === 0) {
        emptyMsg.style.display = "block";
        table.style.display = "none";
        return;
      }

      emptyMsg.style.display = "none";
      table.style.display = "table";

      records.forEach((rec, index) => {
        const row = document.createElement("tr");
        const color = rec.type === "Gelir" ? "#28a745" : "#dc3545";

        row.innerHTML = `
          <td>${rec.date || "-"}</td>
          <td>${rec.type || "-"}</td>
          <td>${rec.category || "-"}</td>
          <td>${rec.note || "-"}</td>
          <td style="font-weight:bold; color:${color}">
            ${Number(rec.amount).toLocaleString('tr-TR')} ₺
          </td>
          <td>${rec.account || "Nakit"}</td>
          <td class="actions">
            <button class="edit-btn" onclick="editRecord(${index})">Düzenle</button>
            <button class="delete-btn" onclick="deleteRecord(${index})">Sil</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Kayıt Düzenleme
    window.editRecord = function(index) {
      let records = JSON.parse(localStorage.getItem("transactions")) || [];
      
      // Tarihe göre sıralı listeden gerçek index'i bul
      records.sort((a, b) => new Date(b.date) - new Date(a.date));
      const rec = records[index];

      // add.html sayfasına yönlendir ve verileri doldur
      localStorage.setItem("editRecord", JSON.stringify({index: index, record: rec}));
      window.location.href = "add.html";
    };

    // Kayıt Silme
    window.deleteRecord = function(index) {
      if (confirm("Bu kaydı silmek istediğinize emin misiniz?")) {
        let records = JSON.parse(localStorage.getItem("transactions")) || [];
        records.sort((a, b) => new Date(b.date) - new Date(a.date));
        const realIndex = records[index]; // sıralı listeden gerçek kaydı al

        // Gerçek index'i bulup sil
        let originalRecords = JSON.parse(localStorage.getItem("transactions")) || [];
        const originalIndex = originalRecords.findIndex(r => 
          r.date === realIndex.date && 
          r.amount === realIndex.amount && 
          r.category === realIndex.category
        );

        if (originalIndex !== -1) {
          originalRecords.splice(originalIndex, 1);
          localStorage.setItem("transactions", JSON.stringify(originalRecords));
        }

        loadRecords();
        updateBalances();
      }
    };

    // Sayfa yüklendiğinde
    document.addEventListener("DOMContentLoaded", loadRecords);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tüm Kayıtlar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .actions button {
      margin: 3px;
      padding: 7px 14px;
    }
    .edit-btn {
      background: #ffc107;
      color: black;
    }
  </style>
</head>
<body>
  <h1>📋 Tüm Kayıtlar (En Yeniden Eskiye)</h1>

  <table id="recordsTable">
    <thead>
      <tr>
        <th>Tarih</th>
        <th>Tür</th>
        <th>Kategori</th>
        <th>Açıklama</th>
        <th>Tutar</th>
        <th>Hesap/Kart</th>
        <th>İşlemler</th>
      </tr>
    </thead>
    <tbody id="recordsList"></tbody>
  </table>

  <div id="emptyMessage" style="text-align:center; font-size:18px; color:#666; margin-top:40px; display:none;">
    Henüz kayıt yok.
  </div>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Yeni Kayıt Ekle</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>
  <script>
    function loadRecords() {
      let records = JSON.parse(localStorage.getItem("transactions")) || [];
      
      // Tarihe göre yeniden eskiye sırala
      records.sort((a, b) => new Date(b.date) - new Date(a.date));

      const tbody = document.getElementById("recordsList");
      tbody.innerHTML = "";

      if (records.length === 0) {
        document.getElementById("emptyMessage").style.display = "block";
        return;
      }

      document.getElementById("emptyMessage").style.display = "none";

      records.forEach((rec, sortedIndex) => {
        const row = document.createElement("tr");
        const color = rec.type === "Gelir" ? "#28a745" : "#dc3545";

        row.innerHTML = `
          <td>${rec.date}</td>
          <td>${rec.type}</td>
          <td>${rec.category}</td>
          <td>${rec.note || "-"}</td>
          <td style="font-weight:bold; color:${color}">${Number(rec.amount).toLocaleString('tr-TR')} ₺</td>
          <td>${rec.account || "Nakit"}</td>
          <td class="actions">
            <button class="edit-btn" onclick="editRecord(${sortedIndex})">Düzenle</button>
            <button class="delete-btn" onclick="deleteRecord(${sortedIndex})">Sil</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    window.editRecord = function(sortedIndex) {
      let records = JSON.parse(localStorage.getItem("transactions")) || [];
      records.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      const recordToEdit = records[sortedIndex];
      
      // Düzenlenecek kaydı localStorage'a kaydet
      localStorage.setItem("editRecord", JSON.stringify(recordToEdit));
      
      // add.html sayfasına git
      window.location.href = "add.html";
    };

    window.deleteRecord = function(sortedIndex) {
      if (!confirm("Bu kaydı silmek istediğinize emin misiniz?")) return;

      let records = JSON.parse(localStorage.getItem("transactions")) || [];
      records.sort((a, b) => new Date(b.date) - new Date(a.date));
      const recordToDelete = records[sortedIndex];

      // Gerçek kaydı bulup sil
      let originalRecords = JSON.parse(localStorage.getItem("transactions")) || [];
      const realIndex = originalRecords.findIndex(r => 
        r.date === recordToDelete.date && 
        parseFloat(r.amount) === parseFloat(recordToDelete.amount) &&
        r.category === recordToDelete.category
      );

      if (realIndex !== -1) {
        originalRecords.splice(realIndex, 1);
        localStorage.setItem("transactions", JSON.stringify(originalRecords));
      }

      loadRecords();
      updateBalances();
    };

    document.addEventListener("DOMContentLoaded", loadRecords);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tüm Kayıtlar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📋 Tüm Kayıtlar</h1>

  <table id="recordsTable">
    <thead>
      <tr>
        <th>Tarih</th>
        <th>Tür</th>
        <th>Kategori</th>
        <th>Açıklama</th>
        <th>Tutar</th>
        <th>Hesap/Kart</th>
        <th>İşlemler</th>
      </tr>
    </thead>
    <tbody id="recordsList"></tbody>
  </table>

  <div id="emptyMessage" style="text-align:center; font-size:18px; color:#666; margin-top:30px; display:none;">
    Henüz hiç kayıt yok.
  </div>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Yeni Kayıt Ekle</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>
  <script>
    function loadRecords() {
      const records = JSON.parse(localStorage.getItem("transactions")) || [];
      const tbody = document.getElementById("recordsList");
      const emptyMsg = document.getElementById("emptyMessage");
      const table = document.getElementById("recordsTable");

      tbody.innerHTML = "";

      if (records.length === 0) {
        emptyMsg.style.display = "block";
        table.style.display = "none";
        return;
      }

      emptyMsg.style.display = "none";
      table.style.display = "table";

      records.forEach((rec, index) => {
        const row = document.createElement("tr");
        const color = rec.type === "Gelir" ? "#28a745" : "#dc3545";

        row.innerHTML = `
          <td>${rec.date || "-"}</td>
          <td>${rec.type || "-"}</td>
          <td>${rec.category || "-"}</td>
          <td>${rec.note || "-"}</td>
          <td style="font-weight:bold; color:${color}">
            ${Number(rec.amount).toLocaleString('tr-TR')} ₺
          </td>
          <td>${rec.account || "Nakit"}</td>
          <td>
            <button class="delete-btn" onclick="deleteRecord(${index})">Sil</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    window.deleteRecord = function(index) {
      if (confirm("Bu kaydı silmek istediğinize emin misiniz?")) {
        let records = JSON.parse(localStorage.getItem("transactions")) || [];
        records.splice(index, 1);
        localStorage.setItem("transactions", JSON.stringify(records));
        loadRecords();
        updateBalances();   // ana sayfadaki bakiyeyi de güncelle
      }
    };

    // Sayfa yüklendiğinde
    document.addEventListener("DOMContentLoaded", loadRecords);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıtlar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
    .actions button {
      margin: 2px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body onload="displayRecords()">
  <h1>Kayıtlar</h1>

  <table>
    <thead>
      <tr>
        <th>Tarih</th>
        <th>Tür</th>
        <th>Kategori</th>
        <th>Açıklama</th>
        <th>Tutar</th>
        <th>Hesap/Kart</th>
        <th>Taksit Sayısı</th>
        <th>Son Ödeme Tarihi</th>
        <th>İşlemler</th>
      </tr>
    </thead>
    <tbody id="recordsList">
      <!-- Kayıtlar app.js tarafından buraya eklenecek -->
    </tbody>
  </table>

  <nav class="menu">
    <button onclick="location.href='index.html'">Ana Sayfa</button>
    <button onclick="location.href='add.html'">Kayıt Ekle</button>
    <button onclick="location.href='report.html'">Raporlar</button>
    <button onclick="location.href='accounts.html'">Hesap/Kartlar</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>

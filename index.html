<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Finans Takip Sistemi</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #date, #clock {
      font-size: 18px;
      font-weight: bold;
      margin: 5px 0;
      color: #333;
      text-align: center;
    }
    #balances {
      margin-top: 15px;
      font-size: 16px;
      color: #444;
    }
    nav.menu {
      display: flex;
      flex-direction: column;
      margin-top: 20px;
    }
    nav.menu a {
      margin: 5px 0;
      padding: 10px;
      font-size: 16px;
      text-align: center;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    nav.menu a:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>
  <h1>Finans Takip Sistemi</h1>

  <!-- Canlı Tarih ve Saat -->
  <div id="date"></div>
  <div id="clock"></div>

  <!-- Hesap Bakiyeleri -->
  <div id="balances"></div>

  <!-- Menü -->
  <nav class="menu">
    <a href="add.html">Kayıt Ekle</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
  </nav>

  <!-- JavaScript -->
  <script>
    function startClock() {
      function updateClock() {
        const now = new Date();

        const dateStr = now.toLocaleDateString("tr-TR", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });

        const timeStr = now.toLocaleTimeString("tr-TR");

        document.getElementById("date").textContent = dateStr;
        document.getElementById("clock").textContent = timeStr;
      }

      updateClock();
      setInterval(updateClock, 1000);
    }

    document.addEventListener("DOMContentLoaded", startClock);
  </script>
</body>
</html>

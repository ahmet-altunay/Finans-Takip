<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Ana Sayfa</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #date, #clock {
      font-size: 18px;
      font-weight: bold;
      margin: 5px 0;
      color: #333;
    }
    #balances {
      margin-top: 15px;
      font-size: 16px;
      color: #444;
    }
    nav.menu {
      display: flex;
      flex-direction: column;
      margin-top: 20px;
    }
    nav.menu button {
      margin: 5px 0;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body onload="startClock()">
  <h1>Finans Takip Sistemi</h1>

  <!-- Canlı Tarih ve Saat -->
  <div id="date"></div>
  <div id="clock"></div>

  <!-- Hesap Bakiyeleri -->
  <div id="balances"></div>

  <!-- Menü -->
  <nav class="menu">
    <button onclick="location.href='add.html'">Kayıt Ekle</button>
    <button onclick="location.href='records.html'">Kayıtlar</button>
    <button onclick="location.href='report.html'">Raporlar</button>
    <button onclick="location.href='accounts.html'">Hesap/Kartlar</button>
  </nav>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hesap / Kartlar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>💳 Hesap ve Kartlar</h1>

  <div class="add-account">
    <h2>Yeni Hesap / Kart Ekle</h2>
    <input type="text" id="accountName" placeholder="Hesap/Kart Adı (örn: Garanti KK)">
    <select id="accountType">
      <option value="Nakit">Nakit</option>
      <option value="Banka Hesabı">Banka Hesabı</option>
      <option value="Kredi Kartı">Kredi Kartı</option>
      <option value="Dijital Cüzdan">Dijital Cüzdan</option>
    </select>
    <input type="number" id="initialBalance" step="0.01" placeholder="Başlangıç Bakiyesi (₺)">
    <button onclick="addAccount()">✅ Ekle</button>
  </div>

  <h2>Mevcut Hesaplar</h2>
  <table id="accountsTable">
    <thead>
      <tr>
        <th>Hesap/Kart Adı</th>
        <th>Tür</th>
        <th>Bakiye (₺)</th>
        <th>İşlemler</th>
      </tr>
    </thead>
    <tbody id="accountsList"></tbody>
  </table>

  <div id="emptyMessage" style="text-align:center; color:gray; margin-top:20px; display:none;">
    Henüz hiç hesap eklenmemiş.
  </div>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Kayıt Ekle</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>
  <script>
    function loadAccounts() {
      const accs = JSON.parse(localStorage.getItem("accounts")) || [];
      const tbody = document.getElementById("accountsList");
      const emptyMsg = document.getElementById("emptyMessage");

      tbody.innerHTML = "";

      if (accs.length === 0) {
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      accs.forEach((acc, index) => {
        const balance = parseFloat(acc.balance) || 0;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${acc.name}</td>
          <td>${acc.type}</td>
          <td style="font-weight:bold; color:${balance >= 0 ? '#28a745' : '#dc3545'}">
            ${balance.toLocaleString('tr-TR')} ₺
          </td>
          <td><button class="delete-btn" onclick="deleteAccount(${index})">Sil</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function addAccount() {
      const name = document.getElementById("accountName").value.trim();
      const type = document.getElementById("accountType").value;
      const balance = parseFloat(document.getElementById("initialBalance").value) || 0;

      if (!name) return alert("Hesap/Kart adı giriniz!");

      let accs = JSON.parse(localStorage.getItem("accounts")) || [];
      accs.push({ name, type, balance });
      localStorage.setItem("accounts", JSON.stringify(accs));

      document.getElementById("accountName").value = "";
      document.getElementById("initialBalance").value = "";

      loadAccounts();
      populateAccounts(); // add.html dropdown'ı güncelle
      alert("✅ Hesap eklendi!");
    }

    window.deleteAccount = function(index) {
      if (confirm("Bu hesabı silmek istediğinize emin misiniz?")) {
        let accs = JSON.parse(localStorage.getItem("accounts")) || [];
        accs.splice(index, 1);
        localStorage.setItem("accounts", JSON.stringify(accs));
        loadAccounts();
        populateAccounts();
      }
    };

    document.addEventListener("DOMContentLoaded", loadAccounts);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Raporlar</title>

</head>
<body>

  <!-- Tek Ay Raporu -->

  <select id="monthSelect"></select>
  <button onclick="displayReport()">Raporu Göster</button>

  <!-- İki Ay Karşılaştırma -->
  <h2>Ay Karşılaştırma</h2>
  <label>1. Ay Seç:</label>
  <select id="monthSelect1"></select>

  <label>2. Ay Seç:</label>
  <select id="monthSelect2"></select>

  <button onclick="compareReports()">Karşılaştır</button>

  <!-- Rapor Çıktısı -->
  <div id="report"></div>

  <!-- Menü -->
  <nav class="menu">
    <button onclick="location.href='index.html'">Ana Sayfa</button>
    <button onclick="location.href='add.html'">Kayıt Ekle</button>
    <button onclick="location.href='records.html'">Kayıtlar</button>
    <button onclick="location.href='accounts.html'">Hesap/Kartlar</button>
  </nav>

  <script src="app.js"></script>
  <script>
    // Sayfa açıldığında ay listelerini doldur
    window.onload = function() {
      populateMonthSelect("monthSelect");
      populateMonthSelect("monthSelect1");
      populateMonthSelect("monthSelect2");
    };
  </script>
</body>
</html>

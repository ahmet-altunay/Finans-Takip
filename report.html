<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raporlar - Tüm Dönem</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .report-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }
    .type-header {
      font-size: 1.4em;
      margin: 25px 0 12px 0;
      padding-bottom: 10px;
      border-bottom: 3px solid;
    }
    .gelir-header { color: #28a745; border-color: #28a745; }
    .gider-header { color: #dc3545; border-color: #dc3545; }
    .transfer-header { color: #17a2b8; border-color: #17a2b8; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 20px 0;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f9fa;
      font-weight: bold;
    }
    .total-row {
      font-weight: bold;
      background: #f0f8ff;
      font-size: 1.1em;
    }
    .summary-box {
      background: #e7f3ff;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 1.3em;
    }
  </style>
</head>
<body>
  <h1>📊 Tüm Dönem Raporu</h1>
  <p style="text-align:center; color:#666;">Tüm kayıtlarınıza ait özet ve kategori dağılımları aşağıdadır.</p>

  <!-- Genel Özet -->
  <div class="report-section">
    <h2>Genel Finansal Özet</h2>
    <div id="overallSummary" class="summary-box"></div>
  </div>

  <!-- Kategori Bazında Detaylı Dağılım -->
  <div class="report-section">
    <h2>Kategori Bazında Dağılım (Türlere Göre)</h2>
    <div id="categoryReport"></div>
  </div>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Kayıt Ekle</a>
    <a href="records.html">Kayıtlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>
  <script>
    function generateAllReport() {
      const transactions = JSON.parse(localStorage.getItem("transactions")) || [];

      if (transactions.length === 0) {
        document.getElementById("overallSummary").innerHTML = "<p>Henüz hiç kayıt yok.</p>";
        document.getElementById("categoryReport").innerHTML = "";
        return;
      }

      // Genel Özet Hesapla
      let income = 0, expense = 0, transfer = 0;
      transactions.forEach(t => {
        const amt = parseFloat(t.amount) || 0;
        if (t.type === "Gelir") income += amt;
        else if (t.type === "Gider") expense += amt;
        else if (t.type === "Transfer") transfer += amt;
      });

      const net = income - expense;

      document.getElementById("overallSummary").innerHTML = `
        <strong>Toplam Gelir:</strong> <span style="color:#28a745">${income.toLocaleString('tr-TR')} ₺</span><br>
        <strong>Toplam Gider:</strong> <span style="color:#dc3545">${expense.toLocaleString('tr-TR')} ₺</span><br>
        <strong>Toplam Transfer:</strong> <span style="color:#17a2b8">${transfer.toLocaleString('tr-TR')} ₺</span><br><br>
        <strong style="font-size:1.4em; color:${net >= 0 ? '#28a745' : '#dc3545'}">
          Net Bakiye: ${net.toLocaleString('tr-TR')} ₺
        </strong>
      `;

      // Kategorileri Türlerine Göre Grupla
      const groups = { Gelir: {}, Gider: {}, Transfer: {} };

      transactions.forEach(t => {
        if (!t.category) return;
        const amt = parseFloat(t.amount) || 0;
        if (groups[t.type]) {
          groups[t.type][t.category] = (groups[t.type][t.category] || 0) + amt;
        }
      });

      let html = "";

      // GELİR
      if (Object.keys(groups.Gelir).length > 0) {
        html += `<h3 class="type-header gelir-header">📈 GELİR KATEGORİLERİ</h3>`;
        html += `<table><tr><th>Kategori</th><th>Tutar</th></tr>`;
        let totalIncome = 0;
        Object.keys(groups.Gelir).sort().forEach(cat => {
          const amount = groups.Gelir[cat];
          html += `<tr><td>${cat}</td><td style="color:#28a745; font-weight:bold">${amount.toLocaleString('tr-TR')} ₺</td></tr>`;
          totalIncome += amount;
        });
        html += `<tr class="total-row"><td><strong>Toplam Gelir</strong></td><td style="color:#28a745">${totalIncome.toLocaleString('tr-TR')} ₺</td></tr></table>`;
      }

      // GİDER
      if (Object.keys(groups.Gider).length > 0) {
        html += `<h3 class="type-header gider-header">📉 GİDER KATEGORİLERİ</h3>`;
        html += `<table><tr><th>Kategori</th><th>Tutar</th></tr>`;
        let totalExpense = 0;
        Object.keys(groups.Gider).sort().forEach(cat => {
          const amount = groups.Gider[cat];
          html += `<tr><td>${cat}</td><td style="color:#dc3545; font-weight:bold">${amount.toLocaleString('tr-TR')} ₺</td></tr>`;
          totalExpense += amount;
        });
        html += `<tr class="total-row"><td><strong>Toplam Gider</strong></td><td style="color:#dc3545">${totalExpense.toLocaleString('tr-TR')} ₺</td></tr></table>`;
      }

      // TRANSFER
      if (Object.keys(groups.Transfer).length > 0) {
        html += `<h3 class="type-header transfer-header">🔄 TRANSFER KATEGORİLERİ</h3>`;
        html += `<table><tr><th>Kategori</th><th>Tutar</th></tr>`;
        let totalTransfer = 0;
        Object.keys(groups.Transfer).sort().forEach(cat => {
          const amount = groups.Transfer[cat];
          html += `<tr><td>${cat}</td><td style="color:#17a2b8; font-weight:bold">${amount.toLocaleString('tr-TR')} ₺</td></tr>`;
          totalTransfer += amount;
        });
        html += `<tr class="total-row"><td><strong>Toplam Transfer</strong></td><td style="color:#17a2b8">${totalTransfer.toLocaleString('tr-TR')} ₺</td></tr></table>`;
      }

      document.getElementById("categoryReport").innerHTML = html;
    }

    // Sayfa yüklendiğinde raporu üret
    document.addEventListener("DOMContentLoaded", generateAllReport);
  </script>
</body>
</html>

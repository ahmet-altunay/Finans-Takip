<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raporlar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📊 Raporlar ve Özetler</h1>

  <label>Ay Seç:</label>
  <input type="month" id="monthSelect">

  <div id="emptyMessage" style="color: gray; margin-top: 15px;"></div>

  <section>
    <h2>Gelir ve Gider Özeti</h2>
    <div id="incomeExpenseReport" class="summary"></div>
  </section>

  <section>
    <h2>Kategori Bazında Dağılım</h2>
    <div id="categoryReport"></div>
  </section>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="add.html">Kayıt Ekle</a>
    <a href="records.html">Kayıtlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>
  <script>
    function generateReport() {
      const monthInput = document.getElementById("monthSelect").value;
      const transactions = JSON.parse(localStorage.getItem("transactions")) || [];
      const emptyMsg = document.getElementById("emptyMessage");

      if (!monthInput) {
        emptyMsg.textContent = "Lütfen bir ay seçin.";
        return;
      }

      const filtered = transactions.filter(t => t.date && t.date.startsWith(monthInput));

      if (filtered.length === 0) {
        emptyMsg.textContent = "Bu ay için kayıt bulunamadı.";
        document.getElementById("incomeExpenseReport").innerHTML = "";
        document.getElementById("categoryReport").innerHTML = "";
        return;
      }

      emptyMsg.textContent = "";

      let income = 0, expense = 0;
      filtered.forEach(t => {
        const amt = parseFloat(t.amount) || 0;
        if (t.type === "Gelir") income += amt;
        else if (t.type === "Gider") expense += amt;
      });

      document.getElementById("incomeExpenseReport").innerHTML = `
        <span style="color:#28a745">Gelir: ${income.toLocaleString('tr-TR')} ₺</span> | 
        <span style="color:#dc3545">Gider: ${expense.toLocaleString('tr-TR')} ₺</span><br>
        <strong>Net: ${(income - expense).toLocaleString('tr-TR')} ₺</strong>
      `;

      // Kategori Bazında Özet
      const catMap = {};
      filtered.forEach(t => {
        if (t.type === "Gider" && t.category) {
          catMap[t.category] = (catMap[t.category] || 0) + parseFloat(t.amount);
        }
      });

      let catHtml = "<table><tr><th>Kategori</th><th>Tutar</th></tr>";
      Object.keys(catMap).forEach(cat => {
        catHtml += `<tr><td>${cat}</td><td>${catMap[cat].toLocaleString('tr-TR')} ₺</td></tr>`;
      });
      catHtml += "</table>";
      document.getElementById("categoryReport").innerHTML = catHtml;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const monthInput = document.getElementById("monthSelect");
      const today = new Date().toISOString().slice(0, 7);
      monthInput.value = today;
      monthInput.addEventListener("change", generateReport);
      generateReport();
    });
  </script>
</body>
</html>

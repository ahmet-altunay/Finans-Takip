<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #newCategoryDiv {
      display: none;
      margin-top: 10px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    #csvBtn {
      background: #28a745;
      color: white;
      padding: 15px;
      font-size: 17px;
      font-weight: bold;
      margin: 20px 0;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #csvBtn:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <h1>📌 Yeni Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label>Kategori:</label>
    <select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Yeni Kategori Ekle</button>

    <div id="newCategoryDiv">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı" style="width:70%; display:inline-block;">
      <button type="button" id="saveCategoryBtn" style="width:28%;">Kaydet</button>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note" placeholder="Örn: Market alışverişi">

    <label>Tutar (₺):</label>
    <input type="number" id="amount" step="0.01" required>

    <label>Hesap / Kart:</label>
    <select id="account"></select>

    <button type="submit" style="margin-top:20px; padding:12px; font-size:16px;">✅ Kaydet</button>
  </form>

  <!-- CSV Yükleme Butonu -->
  <h2>📥 Tüm Verileri CSV'den Yükle</h2>
  <button id="csvBtn">📊 CSV Dosyasını Sisteme Yükle (169 kayıt)</button>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>

  <script>
// Düzenleme modu kontrolü
document.addEventListener("DOMContentLoaded", () => {
  const editData = localStorage.getItem("editRecord");
  if (editData) {
    const { index, record } = JSON.parse(editData);
    
    document.getElementById("dateInput").value = record.date || "";
    document.getElementById("type").value = record.type || "Gider";
    document.getElementById("category").value = record.category || "";
    document.getElementById("note").value = record.note || "";
    document.getElementById("amount").value = record.amount || "";
    document.getElementById("account").value = record.account || "";

    // Başlığı değiştir
    document.querySelector("h1").textContent = "📝 Kaydı Düzenle";

    // Form submit olayını değiştir
    const form = document.getElementById("transactionForm");
    form.onsubmit = function(e) {
      e.preventDefault();
      
      let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
      
      // Gerçek index'i bul (tarih + tutar + kategori ile)
      const realIndex = transactions.findIndex(t => 
        t.date === record.date && 
        parseFloat(t.amount) === parseFloat(record.amount) && 
        t.category === record.category
      );

      if (realIndex !== -1) {
        transactions[realIndex] = {
          date: document.getElementById("dateInput").value,
          type: document.getElementById("type").value,
          category: document.getElementById("category").value,
          note: document.getElementById("note").value,
          amount: parseFloat(document.getElementById("amount").value),
          account: document.getElementById("account").value || "Nakit"
        };

        localStorage.setItem("transactions", JSON.stringify(transactions));
        alert("✅ Kayıt başarıyla güncellendi!");
        localStorage.removeItem("editRecord");
        window.location.href = "records.html";
      }
    };
  }
});
</script>
</body>
</html>

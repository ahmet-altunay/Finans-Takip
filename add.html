<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  <style>
    form {
      display: flex;
      flex-direction: column;
      max-width: 400px;
    }
    label {
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, button {
      margin-top: 5px;
      padding: 6px;
      font-size: 14px;
    }
    #installmentSection {
      display: none;
      margin-top: 10px;
    }
    #newCategoryDiv {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Kayıt Ekle</h1>

  <form id="transactionForm">
    <label for="dateInput">Tarih:</label>
    <input type="date" id="dateInput" required>

    <label for="type">Tür:</label>
    <select id="type" onchange="populateCategories()">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label for="category">Kategori:</label>
    <select id="category"></select>
    <button type="button" onclick="showCategoryInput()">+ Kategori Ekle</button>

    <div id="newCategoryDiv" style="display:none;">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı">
      <button type="button" onclick="addCategory()">Ekle</button>
      <p id="categoryMessage" style="color:orange; display:none;"></p>
    </div>

    <label for="note">Açıklama:</label>
    <input type="text" id="note">

    <label for="amount">Tutar:</label>
    <input type="number" id="amount" required>

    <label for="account">Hesap/Kart:</label>
    <select id="account" onchange="toggleInstallments()"></select>

    <!-- Taksit Bölümü -->
    <div id="installmentSection">
      <label for="installments">Taksit Sayısı:</label>
      <input type="number" id="installments" min="0" value="0">
    </div>

    <label for="dueDate">Son Ödeme Tarihi:</label>
    <input type="date" id="dueDate">

    <label for="receiptFile">Fiş/Fatura:</label>
    <input type="file" id="receiptFile">

    <button type="submit">Kaydet</button>
  </form>

  <h2>CSV Aktar</h2>
  <input type="file" id="csvFile" accept=".csv">
  <button type="button" onclick="importCSV()">Aktar</button>

  <nav class="menu">
    <button onclick="location.href='index.html'">Ana Sayfa</button>
    <button onclick="location.href='records.html'">Kayıtlar</button>
    <button onclick="location.href='report.html'">Raporlar</button>
    <button onclick="location.href='accounts.html'">Hesap/Kartlar</button>
  </nav>

  <script src="app.js"></script>
</body>

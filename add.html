<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #newCategoryDiv {
      display: none;
      margin-top: 10px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    #csvBtn {
      background: #28a745;
      color: white;
      padding: 15px;
      font-size: 17px;
      font-weight: bold;
      margin: 25px 0;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #csvBtn:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <h1>📌 Yeni Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label>Kategori:</label>
    <select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Yeni Kategori Ekle</button>

    <div id="newCategoryDiv">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı" style="width:70%; display:inline-block;">
      <button type="button" id="saveCategoryBtn" style="width:28%;">Kaydet</button>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note" placeholder="Örn: Market alışverişi">

    <label>Tutar (₺):</label>
    <input type="number" id="amount" step="0.01" required>

    <label>Hesap / Kart:</label>
    <select id="account"></select>

    <button type="submit" style="margin-top:25px; padding:14px; font-size:17px;">✅ Kaydet</button>
  </form>

  <h2>📥 Tüm Verileri CSV'den Yükle</h2>
  <button id="csvBtn">📊 CSV Dosyasını Sisteme Yükle (169 kayıt)</button>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>

  <!-- DÜZENLEME MODU SCRIPTİ -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const editData = localStorage.getItem("editRecord");

      if (editData) {
        const record = JSON.parse(editData);

        // Formu doldur
        document.getElementById("dateInput").value = record.date || "";
        document.getElementById("type").value = record.type || "Gider";
        document.getElementById("note").value = record.note || "";
        document.getElementById("amount").value = record.amount || "";
        document.getElementById("account").value = record.account || "";

        // Tür seçildikten sonra kategorileri yükle ve mevcut kategoriyi seç
        setTimeout(() => {
          populateCategories();
          setTimeout(() => {
            document.getElementById("category").value = record.category || "";
          }, 100);
        }, 50);

        // Başlığı değiştir
        document.querySelector("h1").innerHTML = "📝 Kaydı Düzenle";

        // Form submit olayını düzenleme moduna çevir
        const form = document.getElementById("transactionForm");
        form.onsubmit = function(e) {
          e.preventDefault();

          let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

          // Eşleşen kaydı bul
          const index = transactions.findIndex(t => 
            t.date === record.date && 
            parseFloat(t.amount) === parseFloat(record.amount) &&
            t.category === record.category
          );

          if (index !== -1) {
            transactions[index] = {
              date: document.getElementById("dateInput").value,
              type: document.getElementById("type").value,
              category: document.getElementById("category").value,
              note: document.getElementById("note").value,
              amount: parseFloat(document.getElementById("amount").value),
              account: document.getElementById("account").value || "Nakit"
            };

            localStorage.setItem("transactions", JSON.stringify(transactions));
            localStorage.removeItem("editRecord");

            alert("✅ Kayıt başarıyla güncellendi!");
            window.location.href = "records.html";
          } else {
            alert("Kayıt bulunamadı!");
          }
        };
      }
    });
  </script>
</body>
</html>

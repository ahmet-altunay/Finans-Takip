<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📌 Yeni Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com"></script>
  <script src="https://www.gstatic.com"></script>
</head>
<body>
  <h1>📌 Yeni Kayıt Ekle</h1>
  <form id="transactionForm">
    <label>Tarih:</label><input type="date" id="dateInput" required>
    <label>Tür:</label>
    <select id="type"><option value="Gelir">Gelir</option><option value="Gider">Gider</option></select>
    <label>Kategori:</label><select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Yeni Kategori</button>
    <div id="newCategoryDiv" style="display:none; margin-top:10px;">
      <input type="text" id="newCategory" placeholder="Kategori adı">
      <button type="button" id="saveCategoryBtn">Kaydet</button>
    </div>
    <label>Açıklama:</label><input type="text" id="note">
    <label>Tutar (₺):</label><input type="number" id="amount" step="0.01" required>
    <label>Hesap / Kart:</label><select id="account"></select>
    <button type="submit" style="margin-top:20px; width:100%; padding:15px;">✅ Kaydet</button>
  </form>

  <nav class="menu"><a href="index.html">Geri Dön</a></nav>

  <script src="app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const waitLoad = setInterval(() => {
        if (typeof db !== "undefined" && typeof populateAccounts === "function") {
          clearInterval(waitLoad);
          populateAccounts();
          populateCategories();
        }
      }, 200);

      document.getElementById("type").addEventListener("change", populateCategories);
      document.getElementById("addCategoryBtn").addEventListener("click", () => {
        document.getElementById("newCategoryDiv").style.display = "block";
      });
      document.getElementById("saveCategoryBtn").addEventListener("click", addNewCategory);
      document.getElementById("transactionForm").addEventListener("submit", addTransaction);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #newCategoryDiv {
      display: none;
      margin-top: 10px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    #csvBtn {
      background: #28a745;
      color: white;
      padding: 15px;
      font-size: 17px;
      font-weight: bold;
      margin: 25px 0;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #csvBtn:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <h1>📌 Yeni Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label>Kategori:</label>
    <select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Yeni Kategori Ekle</button>

    <div id="newCategoryDiv">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı" style="width:70%; display:inline-block;">
      <button type="button" id="saveCategoryBtn" style="width:28%;">Kaydet</button>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note" placeholder="Örn: Market alışverişi">

    <label>Tutar (₺):</label>
    <input type="number" id="amount" step="0.01" required>

    <label>Hesap / Kart:</label>
    <select id="account">
      <option value="">Hesap / Kart seçin...</option>
    </select>

    <button type="submit" style="margin-top:25px; padding:14px; font-size:17px;">✅ Kaydet</button>
  </form>

  <h2>📥 Tüm Verileri CSV'den Yükle</h2>
  <button id="csvBtn">📊 CSV Dosyasını Sisteme Yükle (169 kayıt)</button>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <script src="app.js"></script>

  <script>
    // Sayfa yüklendiğinde hesapları ve kategorileri doldur
    document.addEventListener("DOMContentLoaded", () => {
      populateAccounts();   // Hesap / Kart dropdown'ını doldur
      populateCategories(); // Kategorileri doldur (ilk yükleme)

      // Tür değiştiğinde kategorileri yenile
      document.getElementById("type").addEventListener("change", populateCategories);

      // Yeni kategori butonu
      document.getElementById("addCategoryBtn").addEventListener("click", () => {
        document.getElementById("newCategoryDiv").style.display = "block";
      });

      document.getElementById("saveCategoryBtn").addEventListener("click", addNewCategory);

      // Form submit
      document.getElementById("transactionForm").addEventListener("submit", addTransaction);

      // CSV butonu
      document.getElementById("csvBtn").addEventListener("click", importCSV);

      // Düzenleme modu kontrolü
      const editData = localStorage.getItem("editRecord");
      if (editData) {
        const record = JSON.parse(editData);

        document.getElementById("dateInput").value = record.date || "";
        document.getElementById("type").value = record.type || "Gider";
        document.getElementById("note").value = record.note || "";
        document.getElementById("amount").value = record.amount || "";
        document.getElementById("account").value = record.account || "";

        setTimeout(() => {
          populateCategories();
          setTimeout(() => {
            document.getElementById("category").value = record.category || "";
          }, 100);
        }, 50);

        document.querySelector("h1").innerHTML = "📝 Kaydı Düzenle";
      }
    });
  </script>
</body>
</html>

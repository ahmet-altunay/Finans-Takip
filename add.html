<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 20px;
      background: #f8f9fa;
    }
    h1 { text-align: center; color: #007bff; }
    form { display: flex; flex-direction: column; }
    label { margin-top: 12px; font-weight: bold; }
    input, select, button {
      padding: 10px;
      margin-top: 5px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background: #0056b3; }
    #installmentSection, #newCategoryDiv { display: none; margin-top: 10px; }
    #successMessage {
      color: #28a745;
      font-weight: bold;
      text-align: center;
      margin-top: 15px;
      display: none;
    }
    nav.menu {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    nav.menu a {
      padding: 12px;
      text-align: center;
      background: #2196F3;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>📌 Yeni Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label>Kategori:</label>
    <select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Yeni Kategori Ekle</button>

    <div id="newCategoryDiv">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı">
      <button type="button" id="saveCategoryBtn">Kategoriyi Kaydet</button>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note" placeholder="Örn: Market alışverişi">

    <label>Tutar (₺):</label>
    <input type="number" id="amount" step="0.01" required>

    <label>Hesap / Kart:</label>
    <select id="account">
      <option value="Nakit">Nakit</option>
      <option value="Kredi Kartı">Kredi Kartı</option>
      <option value="Banka Hesabı">Banka Hesabı</option>
    </select>

    <div id="installmentSection">
      <label>Taksit Sayısı:</label>
      <input type="number" id="installments" min="1" value="1">
    </div>

    <label>Son Ödeme Tarihi (opsiyonel):</label>
    <input type="date" id="dueDate">

    <button type="submit">✅ Kaydet</button>
    <div id="successMessage">Kayıt başarıyla eklendi ✅</div>
  </form>

  <h2>📂 CSV Yükle (İçe Aktar)</h2>
  <input type="file" id="csvFile" accept=".csv">
  <button type="button" id="csvBtn">CSV'den Yükle</button>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
  </nav>

  <script src="app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // app.js varsa kategorileri doldur
      if (typeof populateCategories === "function") {
        populateCategories();
      }

      // Tür değişince kategorileri yenile
      document.getElementById("type").addEventListener("change", () => {
        if (typeof populateCategories === "function") populateCategories();
      });

      // Kredi kartı seçilirse taksit alanını göster
      document.getElementById("account").addEventListener("change", (e) => {
        document.getElementById("installmentSection").style.display = 
          e.target.value.includes("Kredi") ? "block" : "none";
      });

      // Yeni kategori butonu
      document.getElementById("addCategoryBtn").addEventListener("click", () => {
        document.getElementById("newCategoryDiv").style.display = "block";
      });

      // Kategori kaydet
      document.getElementById("saveCategoryBtn").addEventListener("click", () => {
        if (typeof addCategory === "function") {
          addCategory();
        } else {
          alert("app.js dosyası eksik veya addCategory fonksiyonu bulunamadı!");
        }
      });

      // Form gönderme
      document.getElementById("transactionForm").addEventListener("submit", (e) => {
        e.preventDefault();   // sayfayı yenilemeyi engeller

        if (typeof addTransaction === "function") {
          addTransaction();
        } else {
          alert("app.js içinde addTransaction fonksiyonu bulunamadı!");
        }
      });

      // CSV yükleme
      document.getElementById("csvBtn").addEventListener("click", () => {
        if (typeof importCSV === "function") {
          importCSV();
        } else {
          alert("app.js içinde importCSV fonksiyonu bulunamadı!");
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type" onchange="populateCategories()">
      <option value="income">Gelir</option>
      <option value="expense">Gider</option>
    </select>

    <label>Kategori:</label>
    <div style="display:flex; gap:8px; align-items:center;">
      <select id="category"></select>
      <button type="button" onclick="showCategoryInput()">+ Kategori Ekle</button>
    </div>

    <!-- Yeni kategori ekleme alanı gizli -->
    <div id="newCategoryDiv" style="display:none; margin-top:10px;">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı">
      <button type="button" onclick="addCategory()">Ekle</button>
      <p id="categoryMessage" style="color:orange; display:none;"></p>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note">

    <label>Tutar:</label>
    <input type="number" id="amount" required>

    <label>Hesap/Kart:</label>
    <select id="account"></select>

    <div id="installmentSection" style="display:none;">
      <label>Taksit Sayısı:</label>
      <input type="number" id="installments" min="2" placeholder="Örn: 12">
    </div>

    <label>Fiş/Fatura (dosya):</label>
    <input type="file" id="receiptFile">

    <button type="submit">Kaydet</button>
  </form>

  <nav class="menu">
    <button onclick="location.href='index.html'">Ana Sayfa</button>
    <button onclick="location.href='records.html'">Kayıtlar</button>
    <button onclick="location.href='report.html'">Raporlar</button>
    <button onclick="location.href='accounts.html'">Hesap/Kartlar</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>

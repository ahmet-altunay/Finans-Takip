<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ekle</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; }
    form { display: flex; flex-direction: column; max-width: 400px; }
    label { margin-top: 10px; font-weight: bold; }
    input, select, button { margin-top: 5px; padding: 8px; font-size: 14px; }
    #installmentSection, #newCategoryDiv, #successMessage { display: none; margin-top: 10px; }
    nav.menu { margin-top: 20px; display: flex; flex-direction: column; }
    nav.menu a { margin: 5px 0; padding: 10px; text-align: center; background: #2196F3; color: white; text-decoration: none; border-radius: 4px; }
    nav.menu a:hover { background: #1976D2; }
    #successMessage { color: green; font-weight: bold; }
  </style>
</head>

<body>
  <h1>Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label>Kategori:</label>
    <select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Kategori Ekle</button>

    <div id="newCategoryDiv">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı">
      <button type="button" id="saveCategoryBtn">Ekle</button>
      <p id="categoryMessage" style="color:orange; display:none;"></p>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note">

    <label>Tutar:</label>
    <input type="number" id="amount" required>

    <label>Hesap/Kart:</label>
    <select id="account">
        <option value="Nakit">Nakit</option>
        <option value="Kredi Kartı">Kredi Kartı</option>
    </select>

    <div id="installmentSection">
      <label>Taksit Sayısı:</label>
      <input type="number" id="installments" min="0" value="0">
    </div>

    <label>Son Ödeme Tarihi:</label>
    <input type="date" id="dueDate">

    <button type="submit">Kaydet</button>
    <div id="successMessage">Kayıt eklendi ✅</div>
  </form>

  <h2>CSV Aktarımı</h2>
  <input type="file" id="csvFile" accept=".csv">
  <button type="button" id="csvBtn">CSV Aktar</button>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="records.html">Kayıtlar</a>
    <a href="report.html">Raporlar</a>
    <a href="accounts.html">Hesap/Kartlar</a>
  </nav>

  <!-- app.js dosyanızın varlığından emin olun -->
  <script src="app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Sayfa yüklenince kategorileri getir
      if (typeof populateCategories === "function") populateCategories();

      // Kategori ekleme panelini aç
      document.getElementById("addCategoryBtn").addEventListener("click", () => {
        document.getElementById("newCategoryDiv").style.display = "block";
      });

      // Tür değişince kategorileri güncelle
      document.getElementById("type").addEventListener("change", () => {
        if (typeof populateCategories === "function") populateCategories();
      });

      // Taksit alanını göster/gizle
      document.getElementById("account").addEventListener("change", (e) => {
        const section = document.getElementById("installmentSection");
        if (e.target.value.toLowerCase().includes("kredi")) {
          section.style.display = "block";
        } else {
          section.style.display = "none";
        }
      });

      // Form gönderildiğinde mesaj göster
      document.getElementById("transactionForm").addEventListener("submit", (e) => {
        // e.preventDefault(); // app.js içinde kayıt işlemi yapılıyorsa bunu aktif edin
        const msg = document.getElementById("successMessage");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
      });

      // Kategori ekle butonuna basınca (app.js içindeki fonksiyonu çağırır)
      document.getElementById("saveCategoryBtn").addEventListener("click", () => {
        if (typeof addCategory === "function") {
            addCategory();
        } else {
            alert("app.js içinde addCategory fonksiyonu bulunamadı!");
        }
      });

      // CSV butonuna basınca
      document.getElementById("csvBtn").addEventListener("click", () => {
        if (typeof importCSV === "function") {
            importCSV();
        } else {
            alert("app.js içinde importCSV fonksiyonu bulunamadı!");
        }
      });
    });
  </script>
</body>
</html>

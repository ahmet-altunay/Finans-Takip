<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📌 Yeni Kayıt Ekle</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- KÜTÜPHANELER BURADA OLMALI (SIRALAMA ÖNEMLİ) -->
  <script src="https://www.gstatic.com"></script>
  <script src="https://www.gstatic.com"></script>
  
  <style>
    #newCategoryDiv { display: none; margin-top: 10px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
    #csvBtn {
      background: #28a745; color: white; padding: 15px; font-size: 17px; font-weight: bold;
      margin: 25px 0; width: 100%; border: none; border-radius: 8px; cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>📌 Yeni Kayıt Ekle</h1>

  <form id="transactionForm">
    <label>Tarih:</label>
    <input type="date" id="dateInput" required>

    <label>Tür:</label>
    <select id="type">
      <option value="Gelir">Gelir</option>
      <option value="Gider">Gider</option>
      <option value="Transfer">Transfer</option>
    </select>

    <label>Kategori:</label>
    <select id="category"></select>
    <button type="button" id="addCategoryBtn">+ Yeni Kategori Ekle</button>

    <div id="newCategoryDiv">
      <input type="text" id="newCategory" placeholder="Yeni kategori adı" style="width:70%;">
      <button type="button" id="saveCategoryBtn" style="width:28%;">Kaydet</button>
    </div>

    <label>Açıklama:</label>
    <input type="text" id="note" placeholder="Örn: Market alışverişi">

    <label>Tutar (₺):</label>
    <input type="number" id="amount" step="0.01" required>

    <label>Hesap / Kart:</label>
    <select id="account">
      <option value="">Hesap / Kart seçin...</option>
    </select>

    <button type="submit" style="margin-top:25px; padding:14px; font-size:17px;">✅ Kaydet</button>
  </form>

  <nav class="menu">
    <a href="index.html">Ana Sayfa</a>
    <a href="records.html">Kayıtlar</a>
    <a href="category.html">Kategori Yönetimi</a>
  </nav>

  <!-- KOD DOSYASI -->
  <script src="app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Fonksiyonların ve Firebase'in hazır olmasını bekleyen güvenli başlatıcı
      const checkReady = setInterval(() => {
        if (typeof db !== "undefined" && typeof populateAccounts === "function") {
          clearInterval(checkReady);
          populateAccounts();
          populateCategories();
          console.log("✅ Firebase Verileri Hazır.");
        }
      }, 200);

      document.getElementById("type").addEventListener("change", populateCategories);
      document.getElementById("addCategoryBtn").addEventListener("click", () => {
        document.getElementById("newCategoryDiv").style.display = "block";
      });
      document.getElementById("saveCategoryBtn").addEventListener("click", addNewCategory);
      document.getElementById("transactionForm").addEventListener("submit", addTransaction);
    });
  </script>
</body>
</html>
